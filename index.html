<!DOCTYPE html>
<html lang="es">

<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<meta name="theme-color" content="#0a0a0a">
<title>José en la Vida Adulta — v0.88</title>
<style>
  :root {
    color-scheme: light only;
    forced-color-adjust: none;
    --bg: #0a0a0a;
    --panel: #141414;
    --panel2: #1c1c1c;
    --line: #2a2a2a;
    --white: #FFFFFF;
    --soft: #CCCCCC;
    --gold: #E8A020;
    --green: #28ECAA;
    --orange: #E86040;
    --pink: #F06DD0;
    --magenta: #C77DFF;
    --red: #FF5A4D;
    --p0: #E8A020;
    --p1: #28ECAA;
    --p2: #F06DD0;
    --p3: #E86040;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--white) !important;
    -webkit-text-fill-color: var(--white);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    min-height: 100svh;
  }
  body { padding: 12px; max-width: 1100px; margin: 0 auto; }
  h1, h2, h3, p, span, div, button, label, li {
    color: var(--white);
    -webkit-text-fill-color: var(--white);
  }
  .mono { font-family: 'Consolas', 'Courier New', monospace; }

  header { text-align: center; padding: 10px 0 14px; }
  header .title {
    font-size: 26px; font-weight: 800; letter-spacing: 0.5px;
    color: var(--gold); -webkit-text-fill-color: var(--gold);
  }
  header .ver { font-size: 14px; color: var(--soft); -webkit-text-fill-color: var(--soft); }
  header .sub { font-size: 15px; color: var(--white); -webkit-text-fill-color: var(--white); margin-top: 6px; font-style: italic; }

  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 16px; margin-bottom: 14px;
  }
  button {
    font-size: 16px; font-weight: 700; cursor: pointer;
    background: var(--panel2); color: var(--white); -webkit-text-fill-color: var(--white);
    border: 1px solid var(--line); border-radius: 9px;
    padding: 11px 14px; min-height: 44px;
    transition: border-color .12s, background .12s;
  }
  button:hover { border-color: var(--gold); }
  button.primary { background: var(--gold); color: #1a1200; -webkit-text-fill-color: #1a1200; border-color: var(--gold); }
  button.primary:hover { background: #ffb733; }
  button:disabled { color: #555; -webkit-text-fill-color: #555; cursor: not-allowed; border-color: var(--line); }
  button:disabled:hover { border-color: var(--line); }

  input[type=text], input[type=number] {
    font-size: 16px; background: var(--panel2); color: var(--white);
    -webkit-text-fill-color: var(--white);
    border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px;
  }

  /* ---- Setup ---- */
  #setup .row { margin: 12px 0; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  #setup label { font-size: 15px; color: var(--soft); -webkit-text-fill-color: var(--soft); min-width: 130px; }

  /* ---- Board ---- */
  .board-wrap { background: #060606; border: 1px solid var(--line); border-radius: 12px; padding: 10px; overflow-x: auto; }
  .board-title { font-size: 14px; color: var(--gold); -webkit-text-fill-color: var(--gold); font-weight: 700; margin-bottom: 8px; letter-spacing: 1px; }
  .board {
    position: relative; width: 640px; height: 300px; margin: 0 auto;
  }
  .node {
    position: absolute; transform: translate(-50%, -50%);
    border: 2px solid var(--line); border-radius: 10px;
    background: var(--panel2); padding: 7px 9px; cursor: pointer;
    text-align: center; min-width: 96px;
    transition: border-color .12s, background .12s;
  }
  .node:hover { border-color: var(--gold); }
  .node.here { border-color: var(--gold); background: #241a05; }
  .node.reachable { border-color: var(--green); }
  .node .code { font-size: 17px; font-weight: 800; color: var(--white); -webkit-text-fill-color: var(--white); }
  .node .nm { font-size: 13px; color: var(--soft); -webkit-text-fill-color: var(--soft); display: block; margin-top: 2px; }
  .node .cost { font-size: 13px; color: var(--gold); -webkit-text-fill-color: var(--gold); font-weight: 700; }
  .node .pawns { font-size: 18px; margin-top: 3px; min-height: 22px; letter-spacing: 2px; }
  svg.links { position: absolute; top: 0; left: 0; width: 640px; height: 300px; pointer-events: none; }

  /* ---- HUD ---- */
  .players-row { display: flex; flex-wrap: wrap; gap: 10px; }
  .pcard { flex: 1 1 230px; background: var(--panel); border: 1px solid var(--line); border-radius: 11px; padding: 12px; }
  .pcard.active { border-color: var(--gold); border-width: 2px; }
  .pname { font-size: 18px; font-weight: 800; }
  .pmeta { font-size: 14px; color: var(--soft); -webkit-text-fill-color: var(--soft); margin: 4px 0 8px; }
  .money { color: var(--gold); -webkit-text-fill-color: var(--gold); font-weight: 800; }
  .metric { margin: 6px 0; }
  .metric .lab { font-size: 13px; font-weight: 700; display: flex; justify-content: space-between; }
  .barbg { height: 12px; background: #242424; border-radius: 6px; overflow: hidden; margin-top: 3px; }
  .barfill { height: 100%; border-radius: 6px; }
  .check { color: var(--green); -webkit-text-fill-color: var(--green); font-weight: 800; }

  /* ---- Actions ---- */
  .actions { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 10px; }
  .actions button { flex: 1 1 200px; text-align: left; }
  .actions .desc { display: block; font-size: 13px; color: var(--soft); -webkit-text-fill-color: var(--soft); font-weight: 400; margin-top: 3px; }
  .turnbar { display: flex; flex-wrap: wrap; gap: 9px; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .turnbar .who { font-size: 18px; font-weight: 800; color: var(--gold); -webkit-text-fill-color: var(--gold); }
  .econ-good { color: var(--green); -webkit-text-fill-color: var(--green); font-weight: 700; }
  .econ-bad { color: var(--red); -webkit-text-fill-color: var(--red); font-weight: 700; }

  /* ---- Log / events ---- */
  .log { max-height: 200px; overflow-y: auto; }
  .logline { font-size: 14px; padding: 4px 0; border-bottom: 1px solid var(--line); }
  .ev-pos { color: var(--green); -webkit-text-fill-color: var(--green); }
  .ev-neg { color: var(--red); -webkit-text-fill-color: var(--red); }
  .ev-silver { color: var(--gold); -webkit-text-fill-color: var(--gold); }

  /* ---- Modal ---- */
  .modal-bg {
    position: fixed; inset: 0; background: #000000d9;
    display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 50;
  }
  .modal {
    background: var(--panel); border: 2px solid var(--gold); border-radius: 14px;
    padding: 20px; max-width: 460px; width: 100%;
  }
  .modal h3 { font-size: 20px; margin-bottom: 10px; }
  .modal .body { font-size: 16px; color: var(--white); -webkit-text-fill-color: var(--white); line-height: 1.45; }
  .modal .silver { font-size: 15px; color: var(--gold); -webkit-text-fill-color: var(--gold); margin-top: 12px; line-height: 1.45; }
  .modal button { width: 100%; margin-top: 16px; }

  .section-tag { font-size: 13px; font-weight: 700; color: var(--gold); -webkit-text-fill-color: var(--gold); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .hidden { display: none !important; }

  @media (prefers-color-scheme: dark) {
    html, body { color: var(--white) !important; -webkit-text-fill-color: var(--white) !important; }
    h1,h2,h3,p,span,div,button,label,li { color: var(--white); -webkit-text-fill-color: var(--white); }
  }
  @media (max-width: 680px) {
    .board { transform: scale(0.92); transform-origin: top left; }
  }
</style>
</head>

<header>
  <div class="title">JOSÉ EN LA VIDA ADULTA</div>

</div>

<!-- GAME -->

  </div>

  <div class="card">
    <div class="turnbar">

    <div class="section-tag" id="actLocLabel">Acciones</div>
    <div class="actions" id="actions"></div>
  </div>

  <div class="players-row" id="playersRow"></div>

  <div class="card">
    <div class="section-tag">Tu historia (eventos recientes)</div>
    <div class="log" id="log"></div>
  </div>
</div>

<!-- VICTORY -->
<div id="victory" class="hidden card"></div>

<div id="modalRoot"></div>

    eff:[['stat','stress',10]], silver:[['stat','experience',3],['stat','resilience',5]], setEcon:'bad',
    title:'Se anuncia recesión', body:'Noticieros, redes, conversaciones. El ambiente económico se enfría.', sl:'Los que aprendieron a navegar la última crisis hoy son los más sólidos.' },
  { id:'recuperacion', cat:'economia', neg:false, w:2, imp:3, cond:[['minTurn',10]], wt:[],
    eff:[['stat','happiness',8]], silver:[], setEcon:'good',
    title:'Anuncian recuperación', body:'Los indicadores giran. Se siente en la calle.', sl:'' },
  { id:'remate', cat:'economia', neg:false, w:4, imp:1, cond:[], wt:[],
    eff:[['liq',35],['stat','happiness',2]], silver:[],
    title:'Remate en el mercado', body:'Aprovechaste rebajas. Ahorro real: $35.', sl:'' },
];
// Validación: ningún negativo sin silver
EVENTS.forEach(e=>{ if(e.neg && (!e.silver||e.silver.length===0)) throw new Error('Evento negativo sin silver: '+e.id); });

const DEFAULT_GOALS = { patrimonio:8000, bienestar:75, conocimientos:60, impacto:60 };
const PLAYER_COLORS = ['var(--p0)','var(--p1)','var(--p2)','var(--p3)'];

/* ============ STATE ============ */
let G = null;

function newPlayer(id, name, idx){
  return {
    id, name, colorIndex:idx,
    timeLeft:HOURS_PER_TURN, liquidity:300,
    bank:0, businesses:[], vehicles:[],
    housing:'family', transport:'walk', currentLocation:'barrio_residencial',
    job:null,
    stats:{ experience:0, dependability:50, leadership:0, health:80, stress:20, happiness:60, reputation:30, resilience:0, knowledge:5 },
  };
}
function newGame(players){
  const econBad = Math.random()<0.5;
  return {
    turn:1, activePlayerIndex:0,
    players: players.map((p,i)=>newPlayer(p.id,p.name,i)),
    world:{ economy: econBad?'bad':'good', wageMult: econBad?0.8:1, salesMult: econBad?0.8:1 },
    log:[], goals: {...DEFAULT_GOALS}, over:false,
  };
}

/* ============ ENGINE ============ */
const UNBOUNDED = new Set(['experience','knowledge']);
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

function applyEff(p, eff){
  for(const e of eff){
    const t=e[0];
    if(t==='liq'){ p.liquidity += e[1]; }
    else if(t==='time'){ p.timeLeft = Math.max(0, p.timeLeft + e[1]); }
    else if(t==='stat'){
      const k=e[1], v=e[2];
      const raw = p.stats[k]+v;
      p.stats[k] = UNBOUNDED.has(k) ? Math.max(0,raw) : clamp(raw,0,100);
    }
  }
}

function evalCond(c, p, turn){
  switch(c[0]){
    case 'minTurn': return turn>=c[1];
    case 'maxTurn': return turn<=c[1];
    case 'housing': return p.housing===c[1];
    case 'transport': return p.transport===c[1];
    case 'statGt': return p.stats[c[1]]>c[2];
    case 'statLt': return p.stats[c[1]]<c[2];
    case 'hasJob': return (p.job!==null)===c[1];
    case 'liquidityLt': return p.liquidity<c[1];
  }
  return true;
}
function weightOf(ev, p, turn){
  let w=ev.w;
  for(const wm of ev.wt){
    // wm formats: ['housing','rent_cheap',mult] | ['statLt','reputation',35,mult] | ['hasJob',false,mult] | ['liquidityLt',200,mult]
    let cond, mult;
    if(wm[0]==='statGt'||wm[0]==='statLt'){ cond=[wm[0],wm[1],wm[2]]; mult=wm[3]; }
    else { cond=[wm[0],wm[1]]; mult=wm[2]; }
    if(evalCond(cond,p,turn)) w*=mult;
  }
  return w;
}

// 25% no pasa nada -> el jugador es el timón
function rollEvent(p, turn){
  const cands = EVENTS.filter(e=> e.cond.every(c=>evalCond(c,p,turn)) );
  if(cands.length===0) return null;
  if(Math.random()<0.25) return null;
  const ws = cands.map(e=>weightOf(e,p,turn));
  const total = ws.reduce((s,w)=>s+w,0);
  let r = Math.random()*total, pick=cands[cands.length-1];
  for(let i=0;i<cands.length;i++){ r-=ws[i]; if(r<=0){ pick=cands[i]; break; } }
  return pick;
}

/* ============ METRICS ============ */
function patrimonio(p){
  const biz = p.businesses.reduce((s,b)=>s+b.capital,0);
  const veh = p.vehicles.reduce((s,v)=>s+v.value,0);
  return p.liquidity + p.bank + biz + veh;
}
function bienestar(p){ return Math.round((p.stats.health + p.stats.happiness + (100-p.stats.stress))/3); }
function conocimientos(p){ return Math.min(100, Math.round(p.stats.knowledge + p.stats.experience*0.5)); }
function impacto(p){ return Math.min(100, Math.round(p.stats.reputation + p.stats.leadership*0.5)); }
function metrics(p){ return { patrimonio:patrimonio(p), bienestar:bienestar(p), conocimientos:conocimientos(p), impacto:impacto(p) }; }

/* ============ ACTIONS ============ */
function actionsFor(p){
  const out=[]; const loc=p.currentLocation;
  if(loc==='barrio_residencial'){
    out.push({ id:'rest', label:'Descansar (8h)', hours:8, desc:'+salud, -estrés', ok:p.timeLeft>=8,
      run:()=>{ applyEff(p,[['time',-8],['stat','health',6],['stat','stress',-10],['stat','happiness',3]]); return `${p.name} descansó en casa (+salud, -estrés)`; } });
    out.push({ id:'social', label:'Socializar (4h)', hours:4, desc:'+felicidad, +reputación, -$15', ok:p.timeLeft>=4&&p.liquidity>=15,
      run:()=>{ applyEff(p,[['time',-4],['liq',-15],['stat','happiness',7],['stat','reputation',3]]); return `${p.name} salió con amigos (+felicidad, +reputación)`; } });
  }
  if(loc==='zona_universitaria'){
    out.push({ id:'study', label:'Estudiar (10h)', hours:10, desc:'+8 conocimientos, -$20', ok:p.timeLeft>=10&&p.liquidity>=20,
      run:()=>{ applyEff(p,[['time',-10],['liq',-20],['stat','knowledge',8],['stat','happiness',1]]); return `${p.name} estudió 10h (+8 conocimientos)`; } });
  }
  if(loc==='zona_financiera'){
    out.push({ id:'save', label:'Ahorrar $100 en banco', hours:1, desc:'mueve liquidez a patrimonio', ok:p.timeLeft>=1&&p.liquidity>=100,
      run:()=>{ applyEff(p,[['time',-1],['liq',-100]]); p.bank+=100; return `${p.name} ahorró $100 en el banco`; } });
  }
  if(loc==='feria_libre'){
    if(p.businesses.length===0){
      out.push({ id:'startbiz', label:'Abrir negocio ($500, 12h)', hours:12, desc:'comercio con ventas pasivas', ok:p.timeLeft>=12&&p.liquidity>=500,
        run:()=>{ applyEff(p,[['time',-12],['liq',-500],['stat','experience',3]]);
          p.businesses.push({ id:'biz_'+p.id+'_'+G.turn, capital:500, ticket:12, clientes:8, costosFijos:40 });
          return `${p.name} abrió un negocio en la Feria Libre`; } });
    } else {
      out.push({ id:'operate', label:'Operar negocio (8h)', hours:8, desc:'atender clientes, ingresos por ventas', ok:p.timeLeft>=8,
        run:()=>{ const b=p.businesses[0]; const cl=Math.round(b.clientes*G.world.salesMult); const util=cl*b.ticket-b.costosFijos;
          applyEff(p,[['time',-8],['liq',util],['stat','stress',5],['stat','experience',2],['stat','reputation',1]]);
          return `${p.name} operó negocio: ${cl} clientes, utilidad $${util}`; } });
    }
  }
  for(const j of jobsAt(loc)){
    if(p.job && p.job.id===j.id){
      out.push({ id:'work_'+j.id, label:'Trabajar turno ('+j.hours+'h)', hours:j.hours, desc:`+$${Math.round(j.wage*G.world.wageMult)}, +exp`, ok:p.timeLeft>=j.hours,
        run:()=>{ const wage=Math.round(j.wage*G.world.wageMult);
          applyEff(p,[['time',-j.hours],['liq',wage],['stat','stress',j.stress],['stat','experience',j.exp],['stat','dependability',1]]);
          return `${p.name} trabajó ${j.hours}h en ${j.title} (+$${wage})`; } });
    } else if(p.job===null){
      out.push({ id:'apply_'+j.id, label:'Postular: '+j.title, hours:2, desc:`requiere confiab. ${j.minDep}`, ok:p.timeLeft>=2,
        run:()=>{ applyEff(p,[['time',-2]]);
          if(p.stats.dependability>=j.minDep){ p.job=j; return `${p.name} fue contratado en ${j.title}`; }
          return `${p.name} postuló a ${j.title}: no quedaste (sube tu confiabilidad)`; } });
    }
  }
  return out.filter(a=>a.ok);
}

/* ============ SETUP UI ============ */
function renderNameInputs(){
  const n = clamp(parseInt(document.getElementById('numPlayers').value)||1,1,4);
  let html='';
  for(let i=0;i<n;i++){
    const def = i===0?'José':('Jugador'+(i+1));
    html += `<div class="row"><label>Nombre jugador ${i+1}</label><input type="text" id="pname${i}" value="${def}" maxlength="14"></div>`;
  }
  document.getElementById('nameInputs').innerHTML=html;
  document.getElementById('startRow').classList.remove('hidden');
}
function startGame(){
  const n = clamp(parseInt(document.getElementById('numPlayers').value)||1,1,4);
  const players=[];
  for(let i=0;i<n;i++){
    const el=document.getElementById('pname'+i);
    const nm=(el&&el.value.trim())||('Jugador'+(i+1));
    players.push({ id:'p'+i, name:nm });
  }
  G = newGame(players);
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  renderAll();
}

/* ============ BOARD ============ */
function renderBoard(){
  const active = G.players[G.activePlayerIndex];
  const board = document.getElementById('board');
  // SVG links
  let svg = '<svg class="links" viewBox="0 0 640 300">';
  for(const [a,b] of LINKS){
    const la=locById(a), lb=locById(b);
    svg += `<line x1="${la.x}" y1="${la.y}" x2="${lb.x}" y2="${lb.y}" stroke="#2a2a2a" stroke-width="2" stroke-dasharray="3 4"/>`;
  }
  svg += '</svg>';

  let nodes='';
  for(const loc of LOCATIONS){
    const here = loc.id===active.currentLocation;
    const cost = loc.tc[active.transport];
    const reachable = !here && active.timeLeft>=cost;
    const pawns = G.players.filter(p=>p.currentLocation===loc.id)
      .map(p=>{ const mark = p.id===active.id?'★':'●'; return `<span style="color:${PLAYER_COLORS[p.colorIndex]};-webkit-text-fill-color:${PLAYER_COLORS[p.colorIndex]}">${mark}</span>`; }).join('');
    const cls = 'node'+(here?' here':'')+(reachable?' reachable':'');
    const costLine = here ? `<span class="nm">aquí</span>` : `<span class="cost">${cost}h</span>`;
    nodes += `<div class="${cls}" style="left:${loc.x}px;top:${loc.y}px" onclick="moveTo('${loc.id}')">
      <span class="code">${loc.code}</span><span class="nm">${loc.name}</span>${costLine}
      <div class="pawns">${pawns}</div></div>`;
  }
  board.innerHTML = svg + nodes;
}
function moveTo(locId){
  const p = G.players[G.activePlayerIndex];
  if(locId===p.currentLocation) return;
  const cost = locById(locId).tc[p.transport];
  if(p.timeLeft<cost){ flash('No te alcanza el tiempo para moverte.'); return; }
  p.timeLeft -= cost;
  p.currentLocation = locId;
  renderAll();
}

/* ============ HUD ============ */
function metricBar(label, val, goal, color){
  const pct = Math.min(100, (val/goal)*100);
  const done = val>=goal ? '<span class="check"> ✓</span>' : '';
  return `<div class="metric"><div class="lab"><span>${label}</span><span>${Math.round(val)} / ${goal}${done}</span></div>
    <div class="barbg"><div class="barfill" style="width:${pct}%;background:${color}"></div></div></div>`;
}
function renderPlayers(){
  const row = document.getElementById('playersRow');
  let html='';
  for(const p of G.players){
    const m=metrics(p); const col=PLAYER_COLORS[p.colorIndex];
    const active = p.id===G.players[G.activePlayerIndex].id;
    const loc=locById(p.currentLocation);
    html += `<div class="pcard${active?' active':''}">
      <div class="pname" style="color:${col};-webkit-text-fill-color:${col}">${active?'▶ ':''}${p.name}</div>
      <div class="pmeta">en ${loc.name} · ${p.job?p.job.title:'sin empleo'}<br>
        tiempo: <b>${Math.round(p.timeLeft)}</b>/112h · liquidez: <span class="money">$${p.liquidity}</span></div>
      ${metricBar('Patrimonio', m.patrimonio, G.goals.patrimonio, 'var(--gold)')}
      ${metricBar('Bienestar', m.bienestar, G.goals.bienestar, 'var(--green)')}
      ${metricBar('Conocimientos', m.conocimientos, G.goals.conocimientos, 'var(--pink)')}
      ${metricBar('Impacto', m.impacto, G.goals.impacto, 'var(--magenta)')}
    </div>`;
  }
  row.innerHTML=html;
}

/* ============ ACTIONS UI ============ */
function renderActions(){
  const p = G.players[G.activePlayerIndex];
  document.getElementById('turnWho').textContent = `Turno de ${p.name} — ${Math.round(p.timeLeft)}h restantes`;
  const econ = G.world.economy==='good'
    ? '<span class="econ-good">● buen año</span>' : '<span class="econ-bad">● mal año</span>';
  document.getElementById('turnEcon').innerHTML = `Quincena ${G.turn} · ${econ}`;
  document.getElementById('actLocLabel').textContent = 'Acciones en ' + locById(p.currentLocation).name;

  const acts = actionsFor(p);
  const cont = document.getElementById('actions');
  if(acts.length===0){
    cont.innerHTML = `<div class="pmeta">No hay acciones aquí. Muévete a otra zona o termina tu quincena.</div>`;
    return;
  }
  cont.innerHTML = acts.map((a,i)=>`<button onclick="doAction(${i})"><span>${a.label}</span><span class="desc">${a.desc}</span></button>`).join('');
  window.__acts = acts;
}
function doAction(i){
  const a = window.__acts[i];
  const log = a.run();
  pushLog(log, 'plain');
  renderAll();
}

/* ============ LOG ============ */
function pushLog(text, kind){ G.log.push({ text, kind, turn:G.turn }); }
function renderLog(){
  const el=document.getElementById('log');
  const recent = G.log.slice(-12).reverse();
  el.innerHTML = recent.map(l=>{
    let cls='';
    if(l.kind==='pos') cls='ev-pos'; else if(l.kind==='neg') cls='ev-neg'; else if(l.kind==='silver') cls='ev-silver';
    return `<div class="logline ${cls}">Q${l.turn} · ${l.text}</div>`;
  }).join('');
}

/* ============ TURN FLOW ============ */
function endPlayerTurn(){
  const p = G.players[G.activePlayerIndex];
  p.timeLeft = 0;
  // siguiente jugador con tiempo, o fase de eventos
  if(G.activePlayerIndex < G.players.length-1){
    G.activePlayerIndex++;
    renderAll();
  } else {
    runEventsPhase();
  }
}

function runEventsPhase(){
  // un evento por jugador, encolados como modales
  const queue=[];
  for(const p of G.players){
    const ev = rollEvent(p, G.turn);
    if(ev){
      applyEff(p, ev.eff);
      let silvered=false;
      if(ev.neg && ev.silver.length){ applyEff(p, ev.silver); silvered=true; }
      if(ev.firesJob) p.job=null;
      if(ev.setEcon){ setEconomy(ev.setEcon); }
      pushLog(`${p.name}: ${ev.title}`, ev.neg?'neg':'pos');
      queue.push({ p, ev, silvered });
    }
  }
  // costos fijos de negocios
  for(const p of G.players){ for(const b of p.businesses){ p.liquidity -= b.costosFijos; } }
  // cambio económico aleatorio raro
  if(Math.random()<0.08){ setEconomy(G.world.economy==='good'?'bad':'good', true); }

  showEventQueue(queue, 0);
}

function setEconomy(e, log){
  G.world.economy=e;
  G.world.wageMult = e==='good'?1:0.8;
  G.world.salesMult = e==='good'?1:0.8;
  if(log) pushLog(`La economía cambió a ${e==='good'?'buen año':'mal año'}`, e==='good'?'pos':'neg');
}

function showEventQueue(queue, idx){
  if(idx>=queue.length){ finishTurn(); return; }
  const { p, ev, silvered } = queue[idx];
  const col = PLAYER_COLORS[p.colorIndex];
  const icon = ev.neg ? '✗' : '✦';
  const iconCol = ev.neg ? 'var(--red)' : 'var(--green)';
  const silverHtml = (silvered && ev.sl) ? `<div class="silver">↪ ${ev.sl}</div>` : '';
  const html = `<div class="modal-bg" onclick="event.stopPropagation()">
    <div class="modal">
      <h3><span style="color:${iconCol};-webkit-text-fill-color:${iconCol}">${icon}</span>
        <span style="color:${col};-webkit-text-fill-color:${col}">${p.name}</span> — ${ev.title}</h3>
      <div class="body">${ev.body}</div>
      ${silverHtml}
      <button class="primary" onclick="nextEvent()">Continuar</button>
    </div></div>`;
  document.getElementById('modalRoot').innerHTML = html;
  window.__evq = queue; window.__evi = idx;
}
function nextEvent(){
  document.getElementById('modalRoot').innerHTML='';
  showEventQueue(window.__evq, window.__evi+1);
}

function finishTurn(){
  // ¿alguien ganó?
  const winner = G.players.find(p=>{
    const m=metrics(p);
    return m.patrimonio>=G.goals.patrimonio && m.bienestar>=G.goals.bienestar
        && m.conocimientos>=G.goals.conocimientos && m.impacto>=G.goals.impacto;
  });
  if(winner){ showVictory(winner); return; }
  // nueva quincena
  G.turn++;
  G.activePlayerIndex=0;
  for(const p of G.players) p.timeLeft=HOURS_PER_TURN;
  renderAll();
}

function showVictory(winner){
  G.over=true;
  document.getElementById('game').classList.add('hidden');
  const v=document.getElementById('victory');
  v.classList.remove('hidden');
  const col=PLAYER_COLORS[winner.colorIndex];
  const hist = G.log.filter(l=>l.kind!=='plain').slice(-10).map(l=>`<div class="logline">Q${l.turn} · ${l.text}</div>`).join('');
  v.innerHTML = `
    <div class="section-tag" style="font-size:16px">🏆 Victoria</div>
    <div style="font-size:24px;font-weight:800;margin:8px 0;color:${col};-webkit-text-fill-color:${col}">
      ${winner.name} alcanzó sus metas en la quincena ${G.turn}</div>
    <p style="font-size:16px;color:var(--soft);-webkit-text-fill-color:var(--soft)">Patrimonio, bienestar, conocimientos e impacto: las cuatro al tiempo. Eso es una vida construida.</p>
    <div style="margin-top:14px"><b>Momentos de tu historia:</b>${hist}</div>
    <button class="primary" style="margin-top:16px;max-width:240px" onclick="location.reload()">Jugar de nuevo</button>`;
}

/* ============ HELPERS ============ */
function flash(msg){
  const html=`<div class="modal-bg"><div class="modal"><div class="body">${msg}</div>
    <button class="primary" onclick="document.getElementById('modalRoot').innerHTML=''">Ok</button></div></div>`;
  document.getElementById('modalRoot').innerHTML=html;
}
function renderAll(){
  if(!G||G.over) return;
  renderBoard();
  renderActions();
  renderPlayers();
  renderLog();
}
</script>
</body>
</html>
